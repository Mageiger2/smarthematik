            {
                question: "Was zeigte die Würzburger Studie 2025 (Gerhild Nieding) bzgl. Tablet-Schulen?",
                options: ["Mehr 'Daddeln' (ca. 20% der Zeit)", "Signifikant höhere intrinsische Motivation & mehr kollaboratives Lernen", "Generelle Einschränkungen auf Geräten sind zwingend", "Schlechtere Noten in Deutsch"],
                correct: 1,
                explanation: "1:1-Tablet-Schulen zeigen höhere intrinsische Motivation und mehr kollaboratives Lernen. 'Daddeln' macht max. 1,8% der Zeit aus."
            },
            {
                question: "Wie viel Prozent der Achtklässler erreichen laut ICILS 2023 die höchste Kompetenzstufe V?",
                options: ["1,1%", "12,5%", "25,0%", "40,8%"],
                correct: 0,
                explanation: "Die Leistungsspitze ist extrem klein; nur 1,1% erreichen Kompetenzstufe V."
            },
            {
                question: "Was ist ein zentraler Kritikpunkt der Wissenschaft an Manfred Spitzer?",
                options: ["Er verleugnet die Existenz von Smartphones.", "Er blendet Risiken aus.", "Er wählt Studien selektiv aus und blendet Chancen digitaler Medien aus.", "Er fordert mehr Bildschirmzeit."],
                correct: 2,
                explanation: "Die Wissenschaft kritisiert, dass er Studien selektiv auswählt, Risiken überbetont und Chancen ausblendet."
            },
            {
                question: "Wofür nutzen Jugendliche (JIM 2025) KI-Anwendungen am häufigsten (74%)?",
                options: ["Spiele generieren", "Informationssuche (allgemein)", "Hausaufgaben/Lernen", "Programmieren"],
                correct: 2,
                explanation: "74% nutzen KI-Anwendungen für Hausaufgaben/Lernen (und 70% zur Informationssuche)."
            }
        ];

        // --- KOMPONENTEN ---
        const FactCard = ({ fact }) => (
            <div className="bg-white p-5 rounded-xl border border-slate-200 transition-all duration-200 hover:-translate-y-1 hover:shadow-lg flex flex-col justify-between h-full">
                <p className="text-slate-800 font-medium leading-relaxed mb-4 text-[15px]">{fact.text}</p>
                <div className="mt-auto pt-3 border-t border-slate-100 flex flex-wrap gap-2 text-[11px] text-slate-500 font-semibold tracking-wide uppercase">
                    <span className="bg-blue-50 text-blue-700 px-2 py-1 rounded-md">{fact.study}</span>
                    {fact.year && <span className="bg-slate-100 px-2 py-1 rounded-md">{fact.year}</span>}
                    {fact.author && <span className="bg-amber-50 text-amber-700 px-2 py-1 rounded-md">{fact.author}</span>}
                </div>
            </div>
        );

        const LearnModule = () => {
            const [filter, setFilter] = useState("Alle");
            const categories = ["Alle", "Kinder (6–13)", "Jugendliche (10–19)", "Schule/Unterricht & Meta"];

            const filteredFacts = useMemo(() => {
                if (filter === "Alle") return facts;
                return facts.filter(f => f.category === filter);
            }, [filter]);

            return (
                <div>
                    <div className="flex flex-wrap gap-2 mb-8 justify-center">
                        {categories.map(cat => (
                            <button 
                                key={cat}
                                onClick={() => setFilter(cat)}
                                className={`px-4 py-2 rounded-full text-sm font-semibold transition-colors ${filter === cat ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        {filteredFacts.map((fact, idx) => (
                            <FactCard key={idx} fact={fact} />
                        ))}
                    </div>
                </div>
            );
        };

        const QuizModule = () => {
            const [currentQ, setCurrentQ] = useState(0);
            const [selectedIdx, setSelectedIdx] = useState(null);
            const [isAnswered, setIsAnswered] = useState(false);
            const [score, setScore] = useState(0);
            const [quizFinished, setQuizFinished] = useState(false);

            const question = quizQuestions[currentQ];

            const handleAnswer = (idx) => {
                if (isAnswered) return;
                setSelectedIdx(idx);
                setIsAnswered(true);
                if (idx === question.correct) {
                    setScore(prev => prev + 1);
                }
            };

            const nextQuestion = () => {
                if (currentQ < quizQuestions.length - 1) {
                    setCurrentQ(prev => prev + 1);
                    setSelectedIdx(null);
                    setIsAnswered(false);
                } else {
                    setQuizFinished(true);
                }
            };

            const restartQuiz = () => {
                setCurrentQ(0);
                setSelectedIdx(null);
                setIsAnswered(false);
                setScore(0);
                setQuizFinished(false);
            };

            if (quizFinished) {
                const percentage = Math.round((score / quizQuestions.length) * 100);
                return (
                    <div className="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center">
                        <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-600">
                            <Brain size={40} />
                        </div>
                        <h2 className="text-3xl font-bold text-slate-800 mb-2">Quiz abgeschlossen!</h2>
                        <p className="text-slate-600 mb-6">Du hast {score} von {quizQuestions.length} Fragen richtig beantwortet.</p>
                        
                        <div className="w-full bg-slate-100 rounded-full h-4 mb-8 overflow-hidden">
                            <div className="bg-blue-500 h-4 rounded-full transition-all duration-1000" style={{width: `${percentage}%`}}></div>
                        </div>
                        
                        <button onClick={restartQuiz} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl transition-colors shadow-sm">
                            Quiz neu starten
                        </button>
                    </div>
                );
            }

            return (
                <div className="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="bg-slate-50 px-8 py-4 border-b border-slate-200 flex justify-between items-center text-sm font-semibold text-slate-500">
                        <span>Frage {currentQ + 1} von {quizQuestions.length}</span>
                        <span>Punkte: {score}</span>
                    </div>
                    
                    <div className="p-8">
                        <h3 className="text-xl font-bold text-slate-800 mb-6 leading-snug">{question.question}</h3>
                        
                        <div className="space-y-3">
                            {question.options.map((opt, idx) => {
                                let btnClass = "w-full text-left p-4 rounded-xl border-2 font-medium transition-all duration-200 flex justify-between items-center ";
                                if (!isAnswered) {
                                    btnClass += "border-slate-200 text-slate-700 hover:bg-slate-50 hover:border-slate-300 cursor-pointer";
                                } else {
                                    if (idx === question.correct) {
                                        btnClass += "border-green-500 bg-green-50 text-green-800";
                                    } else if (idx === selectedIdx) {
                                        btnClass += "border-red-500 bg-red-50 text-red-800";
                                    } else {
                                        btnClass += "border-slate-200 text-slate-400 opacity-50 cursor-not-allowed";
                                    }
                                }

                                return (
                                    <button 
                                        key={idx} 
                                        onClick={() => handleAnswer(idx)}
                                        disabled={isAnswered}
                                        className={btnClass}
                                    >
                                        <span>{opt}</span>
                                        {isAnswered && idx === question.correct && <CheckCircle className="text-green-600" size={20} />}
                                        {isAnswered && idx === selectedIdx && idx !== question.correct && <XCircle className="text-red-600" size={20} />}
                                    </button>
                                );
                            })}
                        </div>

                        {isAnswered && (
                            <div className="mt-6 p-4 bg-blue-50 border border-blue-100 rounded-xl text-blue-800 text-sm leading-relaxed">
                                <strong>Erklärung: </strong> {question.explanation}
                            </div>
                        )}

                        {isAnswered && (
                            <div className="mt-8 flex justify-end">
                                <button 
                                    onClick={nextQuestion}
                                    className="bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 px-6 rounded-xl transition-colors shadow-sm flex items-center gap-2"
                                >
                                    {currentQ < quizQuestions.length - 1 ? 'Nächste Frage' : 'Ergebnis anzeigen'}
                                    <ChevronRight size={18} />
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('learn');

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 pb-20">
                    {/* Header */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16 items-center">
                                <div className="flex items-center gap-3">
                                    <div className="bg-blue-600 text-white p-2 rounded-lg">
                                        <Book size={20} />
                                    </div>
                                    <h1 className="text-xl font-bold text-slate-800 tracking-tight">Medienpädagogik <span className="text-blue-600">Smart</span></h1>
                                </div>
                                <div className="flex space-x-1 bg-slate-100 p-1 rounded-lg">
                                    <button 
                                        onClick={() => setActiveTab('learn')}
                                        className={`px-4 py-2 text-sm font-semibold rounded-md transition-all flex items-center gap-2 ${activeTab === 'learn' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        Inhalte Lernen
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('quiz')}
                                        className={`px-4 py-2 text-sm font-semibold rounded-md transition-all flex items-center gap-2 ${activeTab === 'quiz' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        <Brain size={16} />
                                        Quiz
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-10">
                        {activeTab === 'learn' ? <LearnModule /> : <QuizModule />}
                    </main>
                </div>
            );
        };

        // App im DOM rendern
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
