        const formatNum = (num) => {
            if (num === null || num === undefined) return "";

        const VarWn = () => <span>W<sub>n</sub></span>;

        const VarQpowN = () => <span>q<sup>n</sup></span>;

        const FormulaInput = ({ id, label, value, isUnknown, status, disabled, onChange, theme = "green" }) => {
            const isRose = theme === 'rose';
            return (
                <div className="flex flex-col items-center">
                    <div className="mb-1 text-slate-500 font-serif italic text-lg">{label}</div>

                        </div>
                    ) : (

                            <input
                                type="text"
                                value={value}
                                disabled={disabled}
                                onChange={(e) => onChange(id, e.target.value)}
                                className={`w-20 md:w-24 h-12 text-center rounded-lg border-2 text-lg outline-none transition-colors shadow-sm ${
                                    status === 'correct' ? 'border-green-500 bg-green-50 text-green-900' :
                                    status === 'incorrect' ? 'border-red-400 bg-red-50' :
                                    `border-slate-300 ${isRose ? 'focus:border-rose-500 focus:ring-2 focus:ring-rose-200' : 'focus:border-green-500 focus:ring-2 focus:ring-green-200'}`
                                }`}
                                placeholder="..."
                            />
                            {status === 'correct' && <CheckCircle className="w-5 h-5 text-green-600 absolute -top-2 -right-2 bg-white rounded-full shadow-sm" />}
                        </div>
                    )}
                </div>
            );
        };

        const ScientificCalculator = ({ onClose }) => {
            const [display, setDisplay] = useState('');
            const [result, setResult] = useState(null);

            const handlePress = (val) => {
                if (val === 'C') {
                    setDisplay('');
                    setResult(null);
                } else if (val === 'DEL') {
                    setDisplay(prev => prev.slice(0, -1));
                } else if (val === '=') {
                    try {
                        let expr = display
                            .replace(/×/g, '*')
                            .replace(/÷/g, '/')
                            .replace(/\^/g, '**')
                            .replace(/log10\(/g, 'Math.log10(')
                            // logb(basis;wert) implementation
                            .replace(/logb\(([^;]+);([^)]+)\)/g, '(Math.log($2)/Math.log($1))')
                            .replace(/√/g, 'Math.sqrt')
                            .replace(/π/g, 'Math.PI')
                            .replace(/e/g, 'Math.E')
                            .replace(/sin/g, 'Math.sin')
                            .replace(/cos/g, 'Math.cos')
                            .replace(/tan/g, 'Math.tan');
                        
                        // Handle comma as separator for math (except semicolons in logb)
                        expr = expr.replace(/,/g, '.');

                        const res = new Function('return ' + expr)();
                        const formatted = Math.round(res * 1000000) / 1000000;
                        setResult(formatted.toString().replace('.', ','));
                    } catch (e) {
                        setResult('Fehler');
                    }
                } else {
                    setDisplay(prev => prev + val);
                }
            };

            const Btn = ({ label, val, color = 'bg-slate-100 text-slate-700', wide = false, small = false }) => (
                <button 
                    onClick={() => handlePress(val)} 
                    className={`${color} ${wide ? 'col-span-2' : ''} ${small ? 'text-xs p-1.5 sm:text-sm' : 'text-base sm:text-lg p-2'} rounded-lg font-bold hover:brightness-95 active:scale-95 transition-all shadow-sm border border-slate-200 overflow-hidden flex items-center justify-center`}
                >
                    {label}
                </button>
            );

            return (
                <div className="bg-slate-800 p-4 rounded-xl shadow-2xl w-full max-w-sm mx-auto text-white mt-4 border border-slate-600 z-50 relative">
                    <div className="bg-slate-900 p-3 rounded-lg mb-4 text-right min-h-[5rem] flex flex-col justify-center border border-slate-700 relative overflow-hidden">
                        <button onClick={onClose} className="absolute top-1 right-1 text-slate-500 hover:text-slate-300 z-10"><XCircle className="w-5 h-5"/></button>
                        <div className="text-slate-400 text-xs sm:text-sm overflow-x-auto whitespace-nowrap mb-1">{display || '0'}</div>
                        <div className="text-xl sm:text-2xl font-mono text-green-400 font-bold overflow-x-auto whitespace-nowrap">{result !== null ? `= ${result}` : ''}</div>
                    </div>
                    <div className="grid grid-cols-5 gap-1.5">
                        {/* Row 1 */}
                        <Btn label="sin" val="sin(" small color="bg-indigo-700 text-white" />
                        <Btn label="cos" val="cos(" small color="bg-indigo-700 text-white" />
                        <Btn label="tan" val="tan(" small color="bg-indigo-700 text-white" />
                        <Btn label="π" val="π" color="bg-indigo-700 text-white" />
                        <Btn label="e" val="e" color="bg-indigo-700 text-white" />

                        {/* Row 2 */}
                        <Btn label="log₁₀" val="log10(" small color="bg-indigo-600 text-white" />
                        <Btn label="logᵦ" val="logb(" small color="bg-indigo-600 text-white" />
                        <Btn label="√" val="√(" color="bg-indigo-600 text-white" />
                        <Btn label="xʸ" val="^" color="bg-indigo-600 text-white" />
                        <Btn label="DEL" val="DEL" color="bg-orange-500 text-white" />

                        {/* Num Pad Rows */}
                        <Btn label="7" val="7" /> <Btn label="8" val="8" /> <Btn label="9" val="9" /> <Btn label="(" val="(" color="bg-slate-600 text-white" /> <Btn label="÷" val="÷" color="bg-slate-500 text-white" />
                        <Btn label="4" val="4" /> <Btn label="5" val="5" /> <Btn label="6" val="6" /> <Btn label=")" val=")" color="bg-slate-600 text-white" /> <Btn label="×" val="×" color="bg-slate-500 text-white" />
                        <Btn label="1" val="1" /> <Btn label="2" val="2" /> <Btn label="3" val="3" /> <Btn label="C" val="C" color="bg-red-500 text-white" /> <Btn label="-" val="-" color="bg-slate-500 text-white" />
                        <Btn label="0" val="0" /> <Btn label=";" val=";" color="bg-slate-400 text-white" /> <Btn label="," val="," /> <Btn label="=" val="=" color="bg-green-600 text-white" /> <Btn label="+" val="+" color="bg-slate-500 text-white" />
                    </div>
                    <div className="mt-3 text-[10px] text-slate-500 leading-tight">
                        Nutze das Semikolon (;) für die Logarithmus-Basis. <br/>Beispiel: <b>logb(2;8)</b> für log₂(8).
                    </div>

        const ImpressumPage = ({ navigateTo }) => (
            <div className="page-transition max-w-3xl mx-auto px-4 sm:px-6 py-16 text-slate-800">

        const DatenschutzPage = ({ navigateTo }) => (

                <div className="mt-12 flex justify-center">

        );

        const WachstumsTrainer = ({ navigateTo }) => {
            const [problem, setProblem] = useState(null);
            const [step, setStep] = useState(1); 
            const [identificationFeedback, setIdentificationFeedback] = useState(null);
            const [selectedIdentification, setSelectedIdentification] = useState(null);
            const [inputs, setInputs] = useState({ wn: '', w0: '', q: '', n: '' });
            const [inputFeedback, setInputFeedback] = useState({});
            const [options, setOptions] = useState([]);
            const [selectedOptionId, setSelectedOptionId] = useState(null);
            const [transformationFeedback, setTransformationFeedback] = useState(null);
            const [finalAnswer, setFinalAnswer] = useState('');
            const [finalFeedback, setFinalFeedback] = useState(null);
            const [showCalculator, setShowCalculator] = useState(false);
            const [showSolution, setShowSolution] = useState(false);
            const [streak, setStreak] = useState(0);
            const [loading, setLoading] = useState(true);
            const [sequenceIndex, setSequenceIndex] = useState(0);

            const round = (num, decimals = 2) => Math.round(num * Math.pow(10, decimals)) / Math.pow(10, decimals);

            const handleInputChange = (id, val) => {
                const formatted = val.replace('.', ',');
                setInputs(prev => ({ ...prev, [id]: formatted }));
                setInputFeedback(prev => ({ ...prev, [id]: null }));
            };

            const generateProblem = () => {
                setLoading(true); setStep(1); setIdentificationFeedback(null); setSelectedIdentification(null);
                setInputs({ wn: '', w0: '', q: '', n: '' }); setInputFeedback({});
                setOptions([]); setSelectedOptionId(null); setTransformationFeedback(null);
                setFinalAnswer(''); setFinalFeedback(null); setShowCalculator(false); setShowSolution(false);

                const scenarios = ['money', 'population', 'bacteria'];
                const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];
                const sequenceOrder = ['Wn', 'rate', 'W0', 'n'];
                const type = sequenceOrder[sequenceIndex % sequenceOrder.length];
                setSequenceIndex(prev => prev + 1);

                let w0, rate, n, q, wn, unit;

                switch (scenario) {
                    case 'money':
                        unit = "€"; w0 = Math.floor(Math.random() * 50) * 100 + 500; rate = round(Math.random() * 4 + 0.5, 1); n = Math.floor(Math.random() * 10) + 2;
                        break;
                    case 'population':
                        unit = "Einwohner"; w0 = Math.floor(Math.random() * 50) * 1000 + 10000; rate = round(Math.random() * 2 + 0.5, 1); n = Math.floor(Math.random() * 15) + 5;
                        break;
                    case 'bacteria':
                        unit = "Bakterien"; w0 = Math.floor(Math.random() * 100) + 50; rate = Math.floor(Math.random() * 20) + 10; n = Math.floor(Math.random() * 12) + 2;
                        break;
                }

                q = round(1 + rate / 100, 4);
                wn = round(w0 * Math.pow(q, n), 2);
                if (unit === 'Einwohner' || unit === 'Bakterien') wn = Math.round(wn);

                const w0_f = formatNum(w0);
                const wn_f = formatNum(wn);
                const rate_f = formatNum(rate);

                let questionText = "";
                const timeUnit = (scenario === 'bacteria') ? 'Stunden' : 'Jahren';
                const timeAdverb = (scenario === 'bacteria') ? 'stündlich' : 'jährlich';
                const valWord = (scenario === 'money') ? 'Kapital' : 'Bestand';

                switch (type) {
                    case 'Wn':
                        if (scenario === 'money') questionText = `Ein Kapital von ${w0_f} € wird für ${n} Jahre fest angelegt. Der Zinssatz beträgt ${rate_f} %.`;
                        else questionText = `Ein Bestand von ${w0_f} ${unit} wächst ${timeAdverb} um ${rate_f} %. Zeitraum: ${n} ${timeUnit}.`;
                        break;
                    case 'W0': questionText = `Nach ${n} ${timeUnit} ist ein ${valWord} auf ${wn_f} ${unit} angestiegen. Die jährliche Veränderung betrug ${rate_f} %.`; break;
                    case 'rate': questionText = `Ein ${valWord} hat sich in ${n} ${timeUnit} von ${w0_f} ${unit} auf ${wn_f} ${unit} verändert.`; break;
                    case 'n': questionText = `Startwert: ${w0_f} ${unit}. Endwert: ${wn_f} ${unit}. Veränderung: ${rate_f} % pro ${timeUnit === 'Stunden' ? 'Stunde' : 'Jahr'}.`; break;
                }
                questionText += " Was musst du berechnen?";

                let explanation = `Gegeben:\n`;
                if (type !== 'W0') explanation += `W0 = ${formatNum(w0)} ${unit}\n`;
                if (type !== 'Wn') explanation += `Wn = ${formatNum(wn)} ${unit}\n`;
                if (type !== 'n') explanation += `n = ${n}\n`;
                if (type !== 'rate') explanation += `p = ${formatNum(rate)}%  =>  q = ${formatNum(q)}\n`;
                explanation += `\nRechnung:\n`;
                if (type === 'Wn') explanation += `Wn = ${w0_f} · ${formatNum(q)}^${n} = ${wn_f}`;
                if (type === 'W0') explanation += `W0 = ${wn_f} / ${formatNum(q)}^${n} = ${w0_f}`;
                if (type === 'rate') explanation += `q = (${wn_f}/${w0_f})^(1/${n}) = ${formatNum(q)} => p=${rate_f}%`;
                if (type === 'n') explanation += `n = log(${wn_f}/${w0_f}) / log(${formatNum(q)}) = ${n}`;

                const newProblem = { type, scenario, text: questionText, w0, wn, rate, q, n, unit, solution: type === 'rate' ? rate : (type === 'n' ? n : (type === 'W0' ? w0 : wn)), explanation };
                setProblem(newProblem);
                
                let opts = [];
                switch (type) {
                    case 'Wn': opts = [{ id: '1', label: 'Formel ist bereits aufgelöst. Einfach ausrechnen.', isCorrect: true }, { id: '2', label: <span>Teile durch <VarW0/></span>, isCorrect: false }, { id: '3', label: <span>Ziehe die {n}-te Wurzel</span>, isCorrect: false }]; break;
                    case 'W0': opts = [{ id: '1', label: <span>Teile durch <VarQpowN/></span>, isCorrect: true }, { id: '2', label: <span>Multipliziere mit <VarQpowN/></span>, isCorrect: false }, { id: '3', label: <span>Subtrahiere <VarQpowN/></span>, isCorrect: false }]; break;
                    case 'rate': opts = [{ id: '1', label: <span>1. Teile durch <VarW0/> <br/> 2. Ziehe die {n}-te Wurzel</span>, isCorrect: true }, { id: '2', label: <span>1. Teile durch <VarW0/> <br/> 2. Teile durch {n}</span>, isCorrect: false }, { id: '3', label: <span>1. Teile durch {n} <br/> 2. Ziehe die Wurzel</span>, isCorrect: false }]; break;
                    case 'n': opts = [{ id: '1', label: <span>1. Teile durch <VarW0/> <br/> 2. Wende den Logarithmus an</span>, isCorrect: true }, { id: '2', label: <span>1. Teile durch <VarQ/> <br/> 2. Wende den Logarithmus an</span>, isCorrect: false }, { id: '3', label: <span>1. Teile durch <VarW0/> <br/> 2. Ziehe die {n}-te Wurzel</span>, isCorrect: false }]; break;
                }
                setOptions(opts.sort(() => Math.random() - 0.5));
                setLoading(false);
            };

            useEffect(() => { generateProblem(); }, []);

            const handleIdentify = (selected) => {
                if (identificationFeedback === 'correct' || !problem) return;
                setSelectedIdentification(selected);
                if (selected === problem.type) { setIdentificationFeedback('correct'); setTimeout(() => setStep(2), 1000); } else { setIdentificationFeedback('incorrect'); setStreak(0); }
            };

            const checkFormulaInputs = () => {
                if (!problem) return;
                let allCorrect = true, feedback = {};
                const checkVal = (input, target) => { const val = parseFloat(input.replace(',', '.')); if (isNaN(val)) return false; return Math.abs(val - target) < (Math.max(target * 0.01, 0.005)); };
                if (problem.type !== 'Wn' && !checkVal(inputs.wn, problem.wn)) { feedback.wn = 'incorrect'; allCorrect = false; } else feedback.wn = 'correct';
                if (problem.type !== 'W0' && !checkVal(inputs.w0, problem.w0)) { feedback.w0 = 'incorrect'; allCorrect = false; } else feedback.w0 = 'correct';
                if (problem.type !== 'rate' && !checkVal(inputs.q, problem.q)) { feedback.q = 'incorrect'; allCorrect = false; } else feedback.q = 'correct';
                if (problem.type !== 'n' && !checkVal(inputs.n, problem.n)) { feedback.n = 'incorrect'; allCorrect = false; } else feedback.n = 'correct';

            const handleOptionSelect = (opt) => {

            const checkFinalResult = () => {
                if (!problem) return;
                const val = parseFloat(finalAnswer.replace(',', '.')); if (isNaN(val)) return;
                const tolerance = problem.type === 'n' ? 0.5 : (problem.solution * 0.01);
                if (Math.abs(val - problem.solution) <= tolerance || (problem.type === 'n' && Math.round(val) === problem.solution)) {
                    setFinalFeedback('correct'); setStreak(s => s + 1); setShowSolution(true); setStep(5);
                } else { setFinalFeedback('incorrect'); setStreak(0); }

            return (
                <div className="page-transition max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12 text-sans">

                    <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 flex flex-col">

                            </div>

                                            <div className="flex flex-col items-center gap-4">
                                                <div className="flex flex-col sm:flex-row gap-4 justify-center items-center w-full">

                                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 font-serif text-slate-400 italic">{problem.type === 'Wn' ? <VarWn/> : problem.type === 'W0' ? <VarW0/> : problem.type === 'rate' ? 'p' : <VarN/>} =</span>
                                                        <input type="text" value={finalAnswer} onChange={(e) => setFinalAnswer(e.target.value.replace('.', ','))} disabled={step === 5} placeholder="Ergebnis..." className={`pl-16 pr-12 py-3 w-full sm:w-64 rounded-lg border-2 text-lg outline-none ${finalFeedback === 'correct' ? 'border-green-500 bg-green-50 text-green-900' : finalFeedback === 'incorrect' ? 'border-red-400 bg-red-50' : 'border-slate-300 focus:border-green-500'}`} />
                                                        <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-medium">{problem.type === 'rate' ? '%' : problem.unit}</span>
                                                    </div>
                                                    {step === 4 && <button onClick={checkFinalResult} className="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold shadow-lg shadow-green-200 flex items-center justify-center gap-2">Prüfen <ArrowRight className="w-5 h-5"/></button>}
                                                </div>
                                                {step === 4 && !showCalculator && <button onClick={() => setShowCalculator(true)} className="text-slate-500 hover:text-green-600 text-sm font-medium flex items-center gap-2 mt-2 bg-slate-100 px-4 py-2 rounded-lg"><Calculator className="w-4 h-4"/> Taschenrechner anzeigen</button>}
                                                {showCalculator && step === 4 && <ScientificCalculator onClose={() => setShowCalculator(false)}/>}
                                            </div>
                                        </div>
                                    )}

                                    {step === 5 && (
                                        <div className="flex flex-col items-center gap-4 mt-6">
                                            <div className="bg-green-100 text-green-800 px-6 py-3 rounded-full font-bold flex items-center gap-2 text-lg"><CheckCircle className="w-6 h-6" /> Richtig gelöst!</div>
                                            <div className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto mt-4">
                                                <button onClick={() => setShowSolution(!showSolution)} className="text-slate-600 bg-slate-100 hover:bg-slate-200 hover:text-green-700 flex items-center justify-center gap-2 text-sm px-6 py-3 rounded-lg font-medium"><BookOpen className="w-4 h-4"/> Erklärung anzeigen</button>
                                                <button onClick={generateProblem} className="bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-lg font-medium flex items-center justify-center gap-2 shadow-sm"><RefreshCw className="w-4 h-4" /> Nächste Aufgabe</button>
                                            </div>
                                            {showSolution && <div className="w-full bg-yellow-50/80 p-6 rounded-xl border border-yellow-200 mt-4 text-sm font-mono whitespace-pre-line text-slate-700 shadow-inner">{problem.explanation}</div>}
                                        </div>
                                    )}
                                </>
                            ) : (
                                <div className="h-64 flex flex-col items-center justify-center text-slate-400 gap-4"><RefreshCw className="w-8 h-8 animate-spin text-green-400"/>Lade Aufgabe...</div>
                            )}
                        </div>
                    </div>

                    <div className="mt-12 flex justify-center">
                        <button onClick={() => navigateTo('home')} className="inline-flex items-center gap-2 px-6 py-3 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 font-medium rounded-xl transition-all shadow-sm hover:shadow-md hover:-translate-y-0.5">
                            <HomeIcon className="w-5 h-5 text-indigo-500" /> Zurück zur Startseite
                        </button>
                    </div>
                </div>
            );
        };

        const ZerfallsTrainer = ({ navigateTo }) => {
            const [problem, setProblem] = useState(null);
            const [step, setStep] = useState(1); 
            const [identificationFeedback, setIdentificationFeedback] = useState(null);
            const [selectedIdentification, setSelectedIdentification] = useState(null);
            const [inputs, setInputs] = useState({ wn: '', w0: '', q: '', n: '' });
            const [inputFeedback, setInputFeedback] = useState({});
            const [options, setOptions] = useState([]);
            const [selectedOptionId, setSelectedOptionId] = useState(null);
            const [transformationFeedback, setTransformationFeedback] = useState(null);
            const [finalAnswer, setFinalAnswer] = useState('');
            const [finalFeedback, setFinalFeedback] = useState(null);
            const [showCalculator, setShowCalculator] = useState(false);
            const [showSolution, setShowSolution] = useState(false);
            const [streak, setStreak] = useState(0);
            const [loading, setLoading] = useState(true);
            const [sequenceIndex, setSequenceIndex] = useState(0);

            const round = (num, decimals = 2) => Math.round(num * Math.pow(10, decimals)) / Math.pow(10, decimals);

            const handleInputChange = (id, val) => {
                const formatted = val.replace('.', ',');
                setInputs(prev => ({ ...prev, [id]: formatted }));
                setInputFeedback(prev => ({ ...prev, [id]: null }));
            };

            const generateProblem = () => {
                setLoading(true); setStep(1); setIdentificationFeedback(null); setSelectedIdentification(null);
                setInputs({ wn: '', w0: '', q: '', n: '' }); setInputFeedback({});
                setOptions([]); setSelectedOptionId(null); setTransformationFeedback(null);
                setFinalAnswer(''); setFinalFeedback(null); setShowCalculator(false); setShowSolution(false);

                const scenarios = ['radioactivity', 'medicine', 'depreciation'];
                const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];
                const sequenceOrder = ['Wn', 'rate', 'W0', 'n'];
                const type = sequenceOrder[sequenceIndex % sequenceOrder.length];
                setSequenceIndex(prev => prev + 1);

                let w0, rate, n, q, wn, unit;

                switch (scenario) {
                    case 'radioactivity': unit = "mg"; w0 = Math.floor(Math.random() * 100) + 50; rate = round(Math.random() * 5 + 1, 1); n = Math.floor(Math.random() * 20) + 5; break;

                    case 'depreciation': unit = "€"; w0 = Math.floor(Math.random() * 20) * 1000 + 15000; rate = Math.floor(Math.random() * 10) + 8; n = Math.floor(Math.random() * 6) + 3; break;
                }

                q = round(1 - rate / 100, 4);
                wn = round(w0 * Math.pow(q, n), 2);

                const w0_f = formatNum(w0);
                const wn_f = formatNum(wn);
                const rate_f = formatNum(rate);

                let questionText = "";
                const timeUnit = (scenario === 'medicine') ? 'Stunden' : (scenario === 'radioactivity' ? 'Tagen' : 'Jahren');
                const timeAdverb = (scenario === 'medicine') ? 'stündlich' : (scenario === 'radioactivity' ? 'täglich' : 'jährlich');
                const valWord = (scenario === 'depreciation') ? 'Wert' : (scenario === 'medicine' ? 'Wirkstoffmenge' : 'Masse');

                switch (type) {
                    case 'Wn': questionText = `Eine ${valWord} von ${w0_f} ${unit} nimmt ${timeAdverb} um ${rate_f} % ab. Zeitraum: ${n} ${timeUnit}.`; break;
                    case 'W0': questionText = `Nach ${n} ${timeUnit} ist die ${valWord} auf ${wn_f} ${unit} gesunken. Die Abnahme betrug ${rate_f} %.`; break;
                    case 'rate': questionText = `Die ${valWord} ist in ${n} ${timeUnit} von ${w0_f} ${unit} auf ${wn_f} ${unit} gesunken.`; break;
                    case 'n': questionText = `Startwert: ${w0_f} ${unit}. Endwert: ${wn_f} ${unit}. Abnahme: ${rate_f} % pro ${timeUnit === 'Stunden' ? 'Stunde' : (timeUnit === 'Tagen' ? 'Tag' : 'Jahr')}.`; break;
                }
                questionText += " Was musst du berechnen?";

                let explanation = `Gegeben:\n`;
                if (type !== 'W0') explanation += `W0 = ${w0_f} ${unit}\n`;
                if (type !== 'Wn') explanation += `Wn = ${wn_f} ${unit}\n`;
                if (type !== 'n') explanation += `n = ${n}\n`;
                if (type !== 'rate') explanation += `p = ${rate_f}%  =>  q = ${formatNum(q)}\n`;
                explanation += `\nRechnung:\n`;
                if (type === 'Wn') explanation += `Wn = ${w0_f} · ${formatNum(q)}^${n} = ${wn_f}`;
                if (type === 'W0') explanation += `W0 = ${wn_f} / ${formatNum(q)}^${n} = ${w0_f}`;
                if (type === 'rate') explanation += `q = (${wn_f}/${w0_f})^(1/${n}) = ${formatNum(q)} => p=${rate_f}%`;
                if (type === 'n') explanation += `n = log(${wn_f}/${w0_f}) / log(${formatNum(q)}) = ${n}`;

                const newProblem = { type, scenario, text: questionText, w0, wn, rate, q, n, unit, solution: type === 'rate' ? rate : (type === 'n' ? n : (type === 'W0' ? w0 : wn)), explanation };
                setProblem(newProblem);
                
                let opts = [];
                switch (type) {
                    case 'Wn': opts = [{ id: '1', label: 'Formel ist bereits aufgelöst. Einfach ausrechnen.', isCorrect: true }, { id: '2', label: <span>Teile durch <VarW0/></span>, isCorrect: false }, { id: '3', label: <span>Ziehe die {n}-te Wurzel</span>, isCorrect: false }]; break;
                    case 'W0': opts = [{ id: '1', label: <span>Teile durch <VarQpowN/></span>, isCorrect: true }, { id: '2', label: <span>Multipliziere mit <VarQpowN/></span>, isCorrect: false }, { id: '3', label: <span>Subtrahiere <VarQpowN/></span>, isCorrect: false }]; break;
                    case 'rate': opts = [{ id: '1', label: <span>1. Teile durch <VarW0/> <br/> 2. Ziehe die {n}-te Wurzel</span>, isCorrect: true }, { id: '2', label: <span>1. Teile durch <VarW0/> <br/> 2. Teile durch {n}</span>, isCorrect: false }, { id: '3', label: <span>1. Teile durch {n} <br/> 2. Ziehe die Wurzel</span>, isCorrect: false }]; break;
                    case 'n': opts = [{ id: '1', label: <span>1. Teile durch <VarW0/> <br/> 2. Wende den Logarithmus an</span>, isCorrect: true }, { id: '2', label: <span>1. Teile durch <VarQ/> <br/> 2. Wende den Logarithmus an</span>, isCorrect: false }, { id: '3', label: <span>1. Teile durch <VarW0/> <br/> 2. Ziehe die {n}-te Wurzel</span>, isCorrect: false }]; break;
                }
                setOptions(opts.sort(() => Math.random() - 0.5));
                setLoading(false);
            };

            useEffect(() => { generateProblem(); }, []);

            const handleIdentify = (selected) => {
                if (identificationFeedback === 'correct' || !problem) return;
                setSelectedIdentification(selected);
                if (selected === problem.type) { setIdentificationFeedback('correct'); setTimeout(() => setStep(2), 1000); } else { setIdentificationFeedback('incorrect'); setStreak(0); }
            };

            const checkFormulaInputs = () => {
                if (!problem) return;
                let allCorrect = true, feedback = {};
                const checkVal = (input, target) => { const val = parseFloat(input.replace(',', '.')); if (isNaN(val)) return false; return Math.abs(val - target) < (Math.max(target * 0.01, 0.005)); };
                if (problem.type !== 'Wn' && !checkVal(inputs.wn, problem.wn)) { feedback.wn = 'incorrect'; allCorrect = false; } else feedback.wn = 'correct';
                if (problem.type !== 'W0' && !checkVal(inputs.w0, problem.w0)) { feedback.w0 = 'incorrect'; allCorrect = false; } else feedback.w0 = 'correct';
                if (problem.type !== 'rate' && !checkVal(inputs.q, problem.q)) { feedback.q = 'incorrect'; allCorrect = false; } else feedback.q = 'correct';
                if (problem.type !== 'n' && !checkVal(inputs.n, problem.n)) { feedback.n = 'incorrect'; allCorrect = false; } else feedback.n = 'correct';
                setInputFeedback(feedback); if (allCorrect) setStep(3);
            };

            const handleOptionSelect = (opt) => {
                if (transformationFeedback === 'correct') return;
                setSelectedOptionId(opt.id);
                if (opt.isCorrect) { setTransformationFeedback('correct'); setTimeout(() => setStep(4), 1200); } else { setTransformationFeedback('incorrect'); setStreak(0); }
            };

            const checkFinalResult = () => {
                if (!problem) return;
                const val = parseFloat(finalAnswer.replace(',', '.')); if (isNaN(val)) return;
                const tolerance = problem.type === 'n' ? 0.5 : (problem.solution * 0.01);
                if (Math.abs(val - problem.solution) <= tolerance || (problem.type === 'n' && Math.round(val) === problem.solution)) {
                    setFinalFeedback('correct'); setStreak(s => s + 1); setShowSolution(true); setStep(5);
                } else { setFinalFeedback('incorrect'); setStreak(0); }
            };

            return (
                <div className="page-transition max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12 text-sans">
                    <div className="text-center mb-10">
                        <h3 className="text-2xl font-bold text-slate-800">Interaktiver Zerfallstrainer</h3>
                        <p className="text-slate-500 mt-2">Thema: Exponentieller Zerfall (10. Klasse)</p>
                    </div>

                    <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 flex flex-col">
                        <div className="bg-rose-600 p-6 text-white flex flex-col sm:flex-row justify-between items-start sm:items-center shrink-0 gap-4">
                            <div>
                                <h1 className="text-2xl font-bold flex items-center gap-2"><Calculator className="w-6 h-6" /> Zerfallstrainer</h1>
                                <p className="text-rose-100 text-sm mt-1">Mathe 10. Klasse: <VarWn/> = <VarW0/> · <VarQpowN/></p>
                            </div>
                            <div className="bg-rose-700 px-3 py-1.5 rounded-lg text-sm font-semibold flex items-center gap-2">
                                <TrendingDown className="w-4 h-4 text-rose-200" /> <span>Streak: {streak}</span>
                            </div>
                        </div>

                        <div className="p-4 sm:p-6 md:p-8 flex-grow space-y-8" onKeyDown={e => { if(e.key === 'Enter'){ step === 2 && checkFormulaInputs(); step === 4 && checkFinalResult(); }}}>
                            {!loading && problem ? (
                                <>
                                    <div className="bg-slate-50 p-5 rounded-xl border border-slate-200 shadow-sm">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-xs font-bold px-2 py-1 rounded uppercase tracking-wider bg-rose-100 text-rose-700">
                                                {problem.scenario === 'radioactivity' ? 'Radioaktivität' : problem.scenario === 'medicine' ? 'Medizin' : 'Wertverlust'}
                                            </span>
                                            <span className="text-xs font-bold text-rose-600 bg-rose-50 px-2 py-1 rounded">Schritt {step > 4 ? 4 : step} von 4</span>
                                        </div>
                                        <p className="text-lg md:text-xl font-medium leading-relaxed">{problem.text}</p>
                                    </div>

                                    <div className={`transition-opacity duration-300 ${step === 1 ? 'opacity-100' : 'opacity-40 pointer-events-none'}`}>
                                        <p className="text-sm font-semibold text-slate-500 mb-4 text-center uppercase tracking-wide flex items-center justify-center gap-2"><Search className="w-4 h-4"/> 1. Was ist gesucht?</p>
                                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                            {[{ type: 'Wn', label: <VarWn/>, desc: "Endwert" }, { type: 'W0', label: <VarW0/>, desc: "Anfangswert" }, { type: 'rate', label: <VarQ/>, desc: "Faktor" }, { type: 'n', label: <VarN/>, desc: "Laufzeit" }].map((item) => (
                                                <button key={item.type} onClick={() => handleIdentify(item.type)} disabled={step > 1} className={`p-4 rounded-xl border-2 transition-all flex flex-col items-center gap-1 ${selectedIdentification === item.type ? (item.type === problem.type ? 'border-green-500 bg-green-50 text-green-900' : 'border-red-400 bg-red-50 text-red-900') : 'border-slate-200 hover:border-rose-300 bg-white hover:bg-slate-50'}`}>
                                                    <span className="text-xl font-serif font-bold">{item.label}</span><span className="text-[10px] sm:text-xs uppercase font-semibold text-slate-500">{item.desc}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {step >= 2 && (
                                        <div className={`transition-opacity duration-500 border-t pt-8 border-slate-100 ${step > 2 ? 'opacity-40 pointer-events-none' : ''}`}>
                                            <p className="text-sm font-semibold text-slate-500 mb-4 text-center uppercase tracking-wide">2. Fülle die Werte in die Formel ein:</p>
                                            <div className="flex flex-wrap items-center justify-center gap-2 md:gap-4 bg-white p-4 sm:p-6 rounded-xl border border-dashed border-slate-300 overflow-x-auto">
                                                <FormulaInput id="wn" label={<VarWn/>} value={inputs.wn} theme="rose" isUnknown={problem.type === 'Wn'} status={inputFeedback.wn} disabled={step > 2 || inputFeedback.wn === 'correct'} onChange={handleInputChange} />
                                                <span className="text-2xl text-slate-400 font-bold mt-6">=</span>
                                                <FormulaInput id="w0" label={<VarW0/>} value={inputs.w0} theme="rose" isUnknown={problem.type === 'W0'} status={inputFeedback.w0} disabled={step > 2 || inputFeedback.w0 === 'correct'} onChange={handleInputChange} />
                                                <span className="text-2xl text-slate-400 font-bold mt-6">·</span>
                                                <FormulaInput id="q" label={<VarQ/>} value={inputs.q} theme="rose" isUnknown={problem.type === 'rate'} status={inputFeedback.q} disabled={step > 2 || inputFeedback.q === 'correct'} onChange={handleInputChange} />
                                                <div className="relative -top-6"><FormulaInput id="n" label={<span className="text-sm"><VarN/></span>} value={inputs.n} theme="rose" isUnknown={problem.type === 'n'} status={inputFeedback.n} disabled={step > 2 || inputFeedback.n === 'correct'} onChange={handleInputChange} /></div>
                                            </div>
                                            {step === 2 && <div className="mt-6 flex justify-center"><button onClick={checkFormulaInputs} className="bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-lg font-medium w-full sm:w-auto shadow-sm">Werte prüfen</button></div>}
                                        </div>
                                    )}

                                    {step >= 3 && (
                                        <div className={`duration-500 border-t pt-8 border-slate-100 ${step > 3 ? 'opacity-40 pointer-events-none' : ''}`}>
                                            <p className="text-sm font-semibold text-slate-500 mb-4 text-center uppercase tracking-wide">3. Wie formst du die Gleichung um?</p>
                                            <div className="flex justify-center items-center gap-2 text-lg sm:text-xl md:text-2xl font-mono bg-slate-100 py-4 px-2 rounded-lg mb-6 text-slate-700 overflow-x-auto text-center">
                                                <span>{problem.type === 'Wn' ? <span className="text-rose-600 font-bold">Wn</span> : formatNum(problem.wn)} = {problem.type === 'W0' ? <span className="text-rose-600 font-bold">W0</span> : formatNum(problem.w0)} · {problem.type === 'rate' ? <span className="text-rose-600 font-bold">q</span> : formatNum(problem.q)}<sup>{problem.type === 'n' ? <span className="text-rose-600 font-bold">n</span> : problem.n}</sup></span>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                            {options.map((opt) => (
                                                <button key={opt.id} onClick={() => handleOptionSelect(opt)} disabled={step > 3} className={`p-4 rounded-xl border-2 text-sm md:text-base font-medium flex flex-col items-center justify-center gap-2 ${selectedOptionId === opt.id ? (opt.isCorrect ? 'border-green-500 bg-green-50 text-green-900' : 'border-red-400 bg-red-50 text-red-900') : 'border-slate-200 hover:border-rose-300'}`}>
                                                    {opt.label}
                                                </button>
                                            ))}
                                            </div>
                                        </div>
                                    )}

                                    {step >= 4 && (
                                        <div className="duration-500 border-t pt-8 border-slate-100">
                                            <p className="text-sm font-semibold text-slate-500 mb-4 text-center uppercase tracking-wide">4. Berechne das Ergebnis:</p>
                                            <div className="flex flex-col items-center gap-4">
                                                <div className="flex flex-col sm:flex-row gap-4 justify-center items-center w-full">
                                                    <div className="relative w-full sm:w-auto">
                                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 font-serif text-slate-400 italic">{problem.type === 'Wn' ? <VarWn/> : problem.type === 'W0' ? <VarW0/> : problem.type === 'rate' ? 'p' : <VarN/>} =</span>
                                                        <input type="text" value={finalAnswer} onChange={(e) => setFinalAnswer(e.target.value.replace('.', ','))} disabled={step === 5} placeholder="Ergebnis..." className={`pl-16 pr-12 py-3 w-full sm:w-64 rounded-lg border-2 text-lg outline-none ${finalFeedback === 'correct' ? 'border-green-500 bg-green-50 text-green-900' : finalFeedback === 'incorrect' ? 'border-red-400 bg-red-50' : 'border-slate-300 focus:border-rose-500'}`} />
                                                        <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-medium">{problem.type === 'rate' ? '%' : problem.unit}</span>
                                                    </div>
                                                    {step === 4 && <button onClick={checkFinalResult} className="w-full sm:w-auto bg-rose-600 hover:bg-rose-700 text-white px-6 py-3 rounded-lg font-bold shadow-lg shadow-rose-200 flex items-center justify-center gap-2">Prüfen <ArrowRight className="w-5 h-5"/></button>}
                                                </div>
                                                {step === 4 && !showCalculator && <button onClick={() => setShowCalculator(true)} className="text-slate-500 hover:text-rose-600 text-sm font-medium flex items-center gap-2 mt-2 bg-slate-100 px-4 py-2 rounded-lg"><Calculator className="w-4 h-4"/> Taschenrechner anzeigen</button>}
                                                {showCalculator && step === 4 && <ScientificCalculator onClose={() => setShowCalculator(false)}/>}
                                            </div>
                                        </div>
                                    )}

                                    {step === 5 && (
                                        <div className="flex flex-col items-center gap-4 mt-6">
                                            <div className="bg-green-100 text-green-800 px-6 py-3 rounded-full font-bold flex items-center gap-2 text-lg"><CheckCircle className="w-6 h-6" /> Richtig gelöst!</div>
                                            <div className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto mt-4">
                                                <button onClick={() => setShowSolution(!showSolution)} className="text-slate-600 bg-slate-100 hover:bg-slate-200 hover:text-rose-700 flex items-center justify-center gap-2 text-sm px-6 py-3 rounded-lg font-medium"><BookOpen className="w-4 h-4"/> Erklärung anzeigen</button>
                                                <button onClick={generateProblem} className="bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-lg font-medium flex items-center justify-center gap-2 shadow-sm"><RefreshCw className="w-4 h-4" /> Nächste Aufgabe</button>
                                            </div>
                                            {showSolution && <div className="w-full bg-yellow-50/80 p-6 rounded-xl border border-yellow-200 mt-4 text-sm font-mono whitespace-pre-line text-slate-700 shadow-inner">{problem.explanation}</div>}
                                        </div>
                                    )}
                                </>
                            ) : (
                                <div className="h-64 flex flex-col items-center justify-center text-slate-400 gap-4"><RefreshCw className="w-8 h-8 animate-spin text-rose-400"/>Lade Aufgabe...</div>
                            )}
                        </div>
                    </div>

                    <div className="mt-12 flex justify-center">
                        <button onClick={() => navigateTo('home')} className="inline-flex items-center gap-2 px-6 py-3 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 font-medium rounded-xl transition-all shadow-sm hover:shadow-md hover:-translate-y-0.5">
                            <HomeIcon className="w-5 h-5 text-indigo-500" /> Zurück zur Startseite
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                window.scrollTo(0, 0);
                setMobileMenuOpen(false);
            }, [currentPage]);

            const NavButton = ({ id, label, icon: Icon }) => {
                const isActive = currentPage === id;
                return (
                    <button 
                        onClick={() => setCurrentPage(id)}
                        className={`flex items-center gap-2 px-3 py-2 rounded-lg font-medium transition-colors ${isActive ? 'text-indigo-600 bg-indigo-50' : 'text-slate-600 hover:text-indigo-600 hover:bg-slate-50'}`}
                    >
                        {Icon && <Icon className="w-4 h-4" />}
                        {label}
                    </button>
                );
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="bg-white shadow-sm sticky top-0 z-40 border-b border-slate-200">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-4">
                            {/* Linke Seite: Hauptlogo */}
                            <button onClick={() => setCurrentPage('home')} className="flex items-center hover:opacity-80 transition-opacity shrink-0">
                                <img src="Logo-sMArTH.png" alt="sMArTHEMATIK Logo" className="h-6 sm:h-8 md:h-10 w-auto object-contain" />
                            </button>
                            
                            {/* Mittlere Sektion: MS-Süd Logo (Optisch zentriert) */}
                            <div className="flex-grow flex justify-center items-center px-2">
                                <img src="LogoMSsued2.jpg" alt="Mittelschule Dachau-Süd Logo" className="h-6 sm:h-8 md:h-10 w-auto object-contain shadow-sm rounded-sm" />
                            </div>

                            {/* Rechte Seite: Navigation & BdB Logo */}
                            <div className="flex items-center gap-3 shrink-0">
                                {/* Desktop Nav */}
                                <nav className="hidden md:flex items-center gap-2 mr-2">
                                    <NavButton id="home" label="Startseite" icon={HomeIcon} />
                                    <NavButton id="wachstum" label="Wachstumstrainer" icon={TrendingUp} />
                                    <NavButton id="zerfall" label="Zerfallstrainer" icon={TrendingDown} />
                                </nav>

                                {/* Mobile Toggle */}
                                <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="md:hidden p-2 text-slate-600 hover:bg-slate-50 rounded-lg">
                                    {mobileMenuOpen ? <XCircle className="w-6 h-6" /> : <MenuIcon className="w-6 h-6" />}
                                </button>
                                
                                <img src="cropped-BdB_Logo-1.png" alt="Beratung digitale Bildung Logo" className="h-8 sm:h-10 md:h-12 w-auto object-contain" />
                            </div>
                        </div>

                        {/* Mobile Nav Dropdown */}
                        {mobileMenuOpen && (
                            <div className="md:hidden bg-white border-t border-slate-100 p-4 flex flex-col gap-2 shadow-lg absolute w-full z-50">
                                <NavButton id="home" label="Startseite" icon={HomeIcon} />
                                <NavButton id="wachstum" label="Wachstumstrainer" icon={TrendingUp} />
                                <NavButton id="zerfall" label="Zerfallstrainer" icon={TrendingDown} />
                            </div>
                        )}
                    </header>

                    <main className="flex-grow">
                        {currentPage === 'home' && <HomePage navigateTo={setCurrentPage} />}
                        {currentPage === 'wachstum' && <WachstumsTrainer navigateTo={setCurrentPage} />}
                        {currentPage === 'zerfall' && <ZerfallsTrainer navigateTo={setCurrentPage} />}
                        {currentPage === 'impressum' && <ImpressumPage navigateTo={setCurrentPage} />}
                        {currentPage === 'datenschutz' && <DatenschutzPage navigateTo={setCurrentPage} />}
                    </main>

                    <footer className="bg-slate-900 text-slate-400 py-10 mt-auto border-t-4 border-indigo-600">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col items-center text-center space-y-6">
                            <div>
                                <h4 className="text-white text-lg font-bold uppercase tracking-wider mb-2">Kontakt & Infos</h4>
                                <a href="mailto:martin.geiger@ms-dachau-sud.de" className="inline-block px-6 py-2 bg-slate-800 text-slate-200 font-semibold rounded-lg hover:bg-indigo-600 hover:text-white transition-colors shadow-sm text-sm">E-Mail senden</a>
                            </div>
                            
                            <div className="w-full border-t border-slate-800 pt-6 mt-6 flex flex-col md:flex-row justify-between items-center text-sm gap-4">
                                <div>&copy; 2026 - <strong className="text-white">Beratung digitale Bildung</strong></div>
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setCurrentPage('impressum')} className="hover:text-white transition-colors">Impressum</button>
                                    <span className="text-slate-700">|</span>
                                    <button onClick={() => setCurrentPage('datenschutz')} className="hover:text-white transition-colors">Datenschutz</button>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
