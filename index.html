                            )}

                            {step === 5 && (
                                <div className="bg-green-50 border-2 border-green-500 p-8 rounded-xl shadow-sm text-center animate-fade-in mt-6">
                                    {calcOpen && <CalculatorPanel calcInput={calcInput} setCalcInput={setCalcInput} />}
                                    <h3 className="text-3xl font-bold text-green-800 mb-3">Klasse gemacht! 🎉</h3>
                                    <div className="flex flex-col sm:flex-row justify-center gap-4 mt-6">
                                        <button onClick={() => setShowSolution(!showSolution)} className="text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 flex items-center justify-center gap-2 px-6 py-3 rounded-lg font-medium shadow-sm"><BookOpen className="w-4 h-4"/> Lösungsweg zeigen</button>
                                        <button onClick={generateProblem} className="bg-rose-600 hover:bg-rose-700 text-white px-8 py-3 rounded-lg font-bold shadow-md flex items-center justify-center gap-2"><RefreshCw className="w-5 h-5" /> Nächste Aufgabe</button>
                                    </div>
                                    {showSolution && <div className="w-full bg-white p-6 rounded-xl border border-green-200 mt-6 text-sm font-mono whitespace-pre-line text-slate-700 text-left shadow-inner">{problem.explanation}</div>}
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        // ==========================================
        // 4. BRUCHGLEICHUNGSTRAINER
        // ==========================================
        const normalizeString = (str) => {
            if (!str) return "";
            return str.toString().toLowerCase().replace(/\s+/g, '').replace(/,/g, '.').replace(/x2/g, 'x^2').replace(/(^|[\+\-\=\(])1x/g, '$1x');
        };

        const formatDe = (numStr) => numStr.toString().replace(/\./g, ',');

        const checkMultiInput = (inputs, expectedArr) => {
            const normInputs = inputs.map(normalizeString).filter(s => s !== "");
            const normExpected = expectedArr.map(normalizeString);
            if (normInputs.length !== normExpected.length) return false;
            const remainingExpected = [...normExpected];
            for (let val of normInputs) {
                const idx = remainingExpected.indexOf(val);
                if (idx === -1) return false;
                remainingExpected.splice(idx, 1);
            }
            return true;
        };

        const getRandomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        const formatTerm = (coef, isFirst=false, variable="") => {
            if (coef === 0) return "";
            let abs = Math.abs(coef);
            let sign = coef > 0 ? (isFirst ? "" : "+") : "-";
            let val = (abs === 1 && variable !== "") ? variable : abs + variable;
            return sign + val;
        };

        const Frac = ({ top, bot }) => (
            <div className="inline-flex flex-col items-center align-middle mx-1 px-1">
                <div className="border-b-2 border-amber-900 px-2 pb-0.5 w-full text-center">{top}</div>
                <div className="px-2 pt-0.5 text-center">{bot}</div>
            </div>
        );

        const generateTemplate1 = () => {
            while(true) {
                let x1 = getRandomInt(-6, 6) || 1; let x2 = getRandomInt(-6, 6) || 2;
                if (x1 === x2 || x1 + x2 === 0) continue; 
                let p = -(x1 + x2); let q = x1 * x2;
                let C = getRandomInt(2, 4); let x_def = getRandomInt(1, 5);
                if (x1 === x_def || x2 === x_def || x_def === 0 || x1 === 0 || x2 === 0) continue;
                let D = -C * x_def; let A = D - C * p; let B = -C * q;
                if (A === 0) continue; 

                let topStr = `${formatTerm(A, true, 'x')} ${formatTerm(B)}`.trim();
                let botStr = `${C}x ${formatTerm(D)}`;
                let multLeft = `${formatTerm(A, true, 'x')}${formatTerm(B)}`;
                if (multLeft.startsWith('+')) multLeft = multLeft.substring(1);

                return {
                    id: Math.random(), year: "Zufallsaufgabe (Typ 1)",
                    renderEquation: () => <div className="flex items-center text-xl font-math"><Frac top={topStr} bot={botStr} /><span className="mx-2">=</span><span>x</span></div>,
                    steps: {
                        def: { expected: [x_def.toString()], inputs: 1 },
                        hn: { expected: [`${C}x${formatTerm(D)}`, `${C}*(x-${x_def})`, `${C}(x-${x_def})`] },
                        multLeft: { expected: [multLeft] },
                        multRight: { expected: [`${C}x^2${formatTerm(D, false, 'x')}`, `x(${botStr})`] },
                        zusammen: { expected: [`x^2${formatTerm(p, false, 'x')}${formatTerm(q)}=0`, `0=x^2${formatTerm(p, false, 'x')}${formatTerm(q)}`] },
                        pq_p: { expected: [p.toString()] }, pq_q: { expected: [q.toString()] },
                        pq_x1x2: { expected: [x1.toString(), x2.toString()], inputs: 2 },
                        lm: { expected: [x1.toString(), x2.toString()], inputs: 2 }
                    }
                };
            }
        };

        const generateTemplate2 = () => {
            let attempts = 0;
            while(attempts < 2000) {
                attempts++;
                let A = getRandomInt(-8, 8); let B = getRandomInt(-8, 8); let C = getRandomInt(1, 6);
                if (A===0 || B===0 || A+B+C===0) continue;
                let p = -(A+B+C); let q = A*C; let D_disc = p*p/4 - q;
                if (D_disc >= 0 && Number.isInteger(Math.sqrt(D_disc))) {
                    let rootD = Math.sqrt(D_disc); let x1 = -p/2 + rootD; let x2 = -p/2 - rootD;
                    if (Number.isInteger(x1) && Number.isInteger(x2) && x1 !== 0 && x2 !== 0 && x1 !== C && x2 !== C && x1 !== x2) {
                        let bot2Str = `x ${formatTerm(-C)}`; let multLeft1 = `${A}(x${formatTerm(-C)})`; let multLeft2 = `${B > 0 ? '+' : ''}${B}x`;
                        return {
                            id: Math.random(), year: "Zufallsaufgabe (Typ 2)",
                            renderEquation: () => <div className="flex items-center text-xl font-math"><Frac top={A} bot="x" /><span className="mx-2">{B > 0 ? '+' : '-'}</span><Frac top={Math.abs(B)} bot={bot2Str} /><span className="mx-2">=</span><span>1</span></div>,
                            steps: {
                                def: { expected: ["0", C.toString()], inputs: 2 },
                                hn: { expected: [`x(x-${C})`, `x*(x-${C})`, `x^2-${C}x`] },
                                multLeft: { expected: [`${multLeft1}${multLeft2}`, `${A}x${formatTerm(-A*C)}${multLeft2}`, `${formatTerm(A+B, true, 'x')}${formatTerm(-A*C)}`] },
                                multRight: { expected: [`x^2${formatTerm(-C, false, 'x')}`, `x(x-${C})`] },
                                zusammen: { expected: [`x^2${formatTerm(p, false, 'x')}${formatTerm(q)}=0`, `0=x^2${formatTerm(p, false, 'x')}${formatTerm(q)}`] },
                                pq_p: { expected: [p.toString()] }, pq_q: { expected: [q.toString()] },
                                pq_x1x2: { expected: [x1.toString(), x2.toString()], inputs: 2 },
                                lm: { expected: [x1.toString(), x2.toString()], inputs: 2 }
                            }
                        };
                    }
                }
            }
            return generateTemplate1();
        };

        const generateTemplate3 = () => {
            let attempts = 0;
            while(attempts < 2000) {
                attempts++;
                let A = getRandomInt(-6, 6); let B = getRandomInt(-6, 6); let C = getRandomInt(1, 5);
                if (A===0 || B===0 || A+B===0) continue;
                let p = -(A+B); let q = C * (A - B - C); let D_disc = p*p/4 - q;
                if (D_disc >= 0 && Number.isInteger(Math.sqrt(D_disc))) {
                    let rootD = Math.sqrt(D_disc); let x1 = -p/2 + rootD; let x2 = -p/2 - rootD;
                    if (Number.isInteger(x1) && Number.isInteger(x2) && x1 !== C && x2 !== C && x1 !== -C && x2 !== -C && x1 !== x2) {
                        let term1 = `${A}(x${formatTerm(-C)})`; let term2 = `${B > 0 ? '+' : ''}${B}(x${formatTerm(C)})`;
                        return {
                            id: Math.random(), year: "Zufallsaufgabe (Typ 3)",
                            renderEquation: () => <div className="flex items-center text-xl font-math"><Frac top={A} bot={`x ${formatTerm(C)}`} /><span className="mx-2">{B > 0 ? '+' : '-'}</span><Frac top={Math.abs(B)} bot={`x ${formatTerm(-C)}`} /><span className="mx-2">=</span><span>1</span></div>,
                            steps: {
                                def: { expected: [(-C).toString(), C.toString()], inputs: 2 },
                                hn: { expected: [`(x+${C})(x-${C})`, `x^2-${C*C}`, `(x-${C})(x+${C})`] },
                                multLeft: { expected: [`${term1}${term2}`, `${A}x${formatTerm(-A*C)}${formatTerm(B, false, 'x')}${formatTerm(B*C)}`, `${formatTerm(A+B, true, 'x')}${formatTerm(-A*C + B*C)}`] },
                                multRight: { expected: [`x^2-${C*C}`, `(x+${C})(x-${C})`] },
                                zusammen: { expected: [`x^2${formatTerm(p, false, 'x')}${formatTerm(q)}=0`, `0=x^2${formatTerm(p, false, 'x')}${formatTerm(q)}`] },
                                pq_p: { expected: [p.toString()] }, pq_q: { expected: [q.toString()] },
                                pq_x1x2: { expected: [x1.toString(), x2.toString()], inputs: 2 },
                                lm: { expected: [x1.toString(), x2.toString()], inputs: 2 }
                            }
                        };
                    }
                }
            }
            return generateTemplate1();
        };

        const getAnyRandomProblem = () => {
            const rand = Math.random();
            if (rand < 0.33) return generateTemplate1();
            if (rand < 0.66) return generateTemplate2();
            return generateTemplate3();
        };

        const hardcodedProblems = [
            { id: 1, year: "2018 I", renderEquation: () => <div className="flex items-center text-xl font-math"><Frac top="8x + 39" bot="4x - 12" /><span className="mx-2">=</span><span>x</span></div>, steps: { def: { expected: ["3"], inputs: 1 }, hn: { expected: ["4x-12", "4(x-3)", "4*(x-3)", "(4x-12)"] }, multLeft: { expected: ["8x+39"] }, multRight: { expected: ["4x^2-12x", "x(4x-12)", "x*(4x-12)"] }, zusammen: { expected: ["x^2-5x-9.75=0", "x^2-5x-39/4=0", "0=x^2-5x-9.75"] }, pq_p: { expected: ["-5"] }, pq_q: { expected: ["-9.75", "-39/4"] }, pq_x1x2: { expected: ["6.5", "-1.5"], inputs: 2 }, lm: { expected: ["6.5", "-1.5"], inputs: 2 } } },
            { id: 2, year: "2018 II", renderEquation: () => <div className="flex items-center text-xl font-math"><Frac top="x" bot="2" /><span className="mx-2">+</span><Frac top="x" bot="x - 3" /><span className="mx-2">=</span><Frac top="3" bot="x - 3" /><span className="mx-2">- 2</span></div>, steps: { def: { expected: ["3"], inputs: 1 }, hn: { expected: ["2(x-3)", "2*(x-3)", "2x-6"] }, multLeft: { expected: ["x^2-x", "x(x-3)+2x", "x^2-3x+2x"] }, multRight: { expected: ["18-4x", "6-4(x-3)", "6-4x+12"] }, zusammen: { expected: ["x^2+3x-18=0", "0=x^2+3x-18"] }, pq_p: { expected: ["3"] }, pq_q: { expected: ["-18"] }, pq_x1x2: { expected: ["3", "-6"], inputs: 2 }, lm: { expected: ["-6"], inputs: 1 } } },
            { id: 3, year: "2017 I", renderEquation: () => <div className="flex items-center text-xl font-math"><Frac top="x - 4" bot="6" /><span className="mx-2">+</span><Frac top="4(x - 11)" bot="x - 6" /><span className="mx-2">=</span><Frac top="16 - x" bot="2" /></div>, steps: { def: { expected: ["6"], inputs: 1 }, hn: { expected: ["6(x-6)", "6*(x-6)", "6x-36"] }, multLeft: { expected: ["x^2+14x-240", "(x-4)(x-6)+24(x-11)"] }, multRight: { expected: ["-3x^2+66x-288", "3(x-6)(16-x)"] }, zusammen: { expected: ["x^2-13x+12=0", "0=x^2-13x+12", "4x^2-52x+48=0"] }, pq_p: { expected: ["-13"] }, pq_q: { expected: ["12"] }, pq_x1x2: { expected: ["12", "1"], inputs: 2 }, lm: { expected: ["12", "1"], inputs: 2 } } },
            { id: 4, year: "2016 I", renderEquation: () => <div className="flex items-center text-xl font-math"><Frac top="2(x + 2)" bot="x" /><span className="mx-2">=</span><span className="mx-2">2 -</span><Frac top="2 - x" bot="x - 2" /></div>, steps: { def: { expected: ["0", "2"], inputs: 2 }, hn: { expected: ["x(x-2)", "x*(x-2)", "x^2-2x"] }, multLeft: { expected: ["2x^2-8", "2(x+2)(x-2)", "(2x+4)(x-2)"] }, multRight: { expected: ["3x^2-6x", "2x(x-2)-x(2-x)", "2x^2-4x-2x+x^2"] }, zusammen: { expected: ["x^2-6x+8=0", "0=x^2-6x+8"] }, pq_p: { expected: ["-6"] }, pq_q: { expected: ["8"] }, pq_x1x2: { expected: ["4", "2"], inputs: 2 }, lm: { expected: ["4"], inputs: 1 } } },
            { id: 5, year: "2015 I", renderEquation: () => <div className="flex items-center text-xl font-math"><Frac top="4x" bot="3x + 7" /><span className="mx-2">+</span><Frac top="4" bot="6 + 2x" /><span className="mx-2">=</span><span className="mx-2">1 -</span><Frac top="x" bot="3x + 7" /></div>, steps: { def: { expected: ["-7/3", "-3", "-2.33", "-2.333"], inputs: 2 }, hn: { expected: ["(3x+7)(6+2x)", "2(3x+7)(x+3)", "6x^2+32x+42"] }, multLeft: { expected: ["8x^2+36x+28", "10x^2+42x+28", "4x(6+2x)+4(3x+7)"] }, multRight: { expected: ["4x^2+26x+42", "6x^2+32x+42", "(3x+7)(6+2x)-x(6+2x)"] }, zusammen: { expected: ["x^2+2.5x-3.5=0", "0=x^2+2.5x-3.5", "4x^2+10x-14=0"] }, pq_p: { expected: ["2.5"] }, pq_q: { expected: ["-3.5"] }, pq_x1x2: { expected: ["1", "-3.5"], inputs: 2 }, lm: { expected: ["1", "-3.5"], inputs: 2 } } },
            { id: 6, year: "2015 II", renderEquation: () => <div className="flex items-center text-xl font-math"><Frac top="2x - 1" bot="x" /><span className="mx-2">-</span><Frac top="3 + x" bot="3 - x" /><span className="mx-2">=</span><span className="mx-2">-</span><Frac top="3" bot="x" /><span className="mx-2">+ 2</span></div>, steps: { def: { expected: ["0", "3"], inputs: 2 }, hn: { expected: ["x(x-3)", "x*(x-3)", "x(3-x)", "x*(3-x)"] }, multLeft: { expected: ["3x^2-4x+3", "-3x^2+4x-3"] }, multRight: { expected: ["2x^2-9x+9", "-2x^2+9x-9"] }, zusammen: { expected: ["x^2+5x-6=0", "0=x^2+5x-6", "-x^2-5x+6=0"] }, pq_p: { expected: ["5"] }, pq_q: { expected: ["-6"] }, pq_x1x2: { expected: ["1", "-6"], inputs: 2 }, lm: { expected: ["1", "-6"], inputs: 2 } } }
        ];

        const BruchgleichungsTrainer = () => {
            const [probList, setProbList] = useState([getAnyRandomProblem()]);
            const [currentProblemIdx, setCurrentProblemIdx] = useState(0);
            const [isPruefungsMode, setIsPruefungsMode] = useState(false);
            
            const [currentStep, setCurrentStep] = useState(1);
            const [attempts, setAttempts] = useState(0);
            const [errorMsg, setErrorMsg] = useState("");
            const [showHint, setShowHint] = useState(false);
            
            const [defInputs, setDefInputs] = useState(["", ""]);
            const [hnInput, setHnInput] = useState("");
            const [multLeft, setMultLeft] = useState("");
            const [multRight, setMultRight] = useState("");
            const [zusInput, setZusInput] = useState("");
            const [pqP, setPqP] = useState("");
            const [pqQ, setPqQ] = useState("");
            const [einsetzenP1, setEinsetzenP1] = useState("");
            const [einsetzenP2, setEinsetzenP2] = useState("");
            const [einsetzenQ, setEinsetzenQ] = useState("");
            const [pqX, setPqX] = useState(["", ""]);
            const [lmInputs, setLmInputs] = useState(["", ""]);

            const [calcOpen, setCalcOpen] = useState(false);
            const [calcInput, setCalcInput] = useState("");

            const prob = probList[currentProblemIdx];

            const clearForm = () => {
                setCurrentStep(1); setAttempts(0); setErrorMsg(""); setShowHint(false);
                setDefInputs(["", ""]); setHnInput(""); setMultLeft(""); setMultRight("");
                setZusInput(""); setPqP(""); setPqQ(""); setEinsetzenP1(""); setEinsetzenP2("");
                setEinsetzenQ(""); setPqX(["", ""]); setLmInputs(["", ""]);
            };

            const handleLoadPruefung = () => {
                if (isPruefungsMode) { setCurrentProblemIdx((prev) => (prev + 1) % hardcodedProblems.length); } 
                else { setProbList(hardcodedProblems); setCurrentProblemIdx(0); setIsPruefungsMode(true); }
                clearForm();
            };

            const handleGenerateProblem = () => {
                setProbList([getAnyRandomProblem()]); setCurrentProblemIdx(0); setIsPruefungsMode(false); clearForm();
            };

            const handleError = () => { setAttempts(prev => prev + 1); if (attempts >= 2) setShowHint(true); };
            const advanceStep = () => { setCurrentStep(prev => prev + 1); setAttempts(0); setErrorMsg(""); setShowHint(false); };

            const validateStep1 = () => { const inputs = defInputs.slice(0, prob.steps.def.inputs); if (checkMultiInput(inputs, prob.steps.def.expected)) advanceStep(); else { setErrorMsg("Die Definitionsmenge ist nicht ganz richtig."); handleError(); } };
            const validateStep2 = () => { if (prob.steps.hn.expected.map(normalizeString).includes(normalizeString(hnInput))) advanceStep(); else { setErrorMsg("Der Hauptnenner stimmt nicht."); handleError(); } };
            const validateStep3 = () => { const leftOk = prob.steps.multLeft.expected.map(normalizeString).includes(normalizeString(multLeft)); const rightOk = prob.steps.multRight.expected.map(normalizeString).includes(normalizeString(multRight)); if (leftOk && rightOk) advanceStep(); else { setErrorMsg("Beim Durchmultiplizieren ist ein Fehler passiert. Hast du an alle Terme gedacht?"); handleError(); } };
            const validateStep4 = () => { if (prob.steps.zusammen.expected.map(normalizeString).includes(normalizeString(zusInput))) advanceStep(); else { setErrorMsg("Die Normalform ist nicht korrekt. Bringe alles auf eine Seite (= 0) und achte auf x²."); handleError(); } };
            const validateStep5 = () => { const pOk = normalizeString(pqP) === normalizeString(prob.steps.pq_p.expected[0]); const qOk = normalizeString(pqQ) === normalizeString(prob.steps.pq_q.expected[0]); if (pOk && qOk) advanceStep(); else { setErrorMsg("p oder q ist falsch abgelesen. Achte auf die Vorzeichen!"); handleError(); } };
            const validateStep6 = () => { const pExp = normalizeString(prob.steps.pq_p.expected[0]); const qExp = normalizeString(prob.steps.pq_q.expected[0]); if (normalizeString(einsetzenP1) === pExp && normalizeString(einsetzenP2) === pExp && normalizeString(einsetzenQ) === qExp) { advanceStep(); } else { setErrorMsg("Setze p und q genau so in die Kästchen ein, wie du sie oben abgelesen hast (inkl. Vorzeichen)."); handleError(); } };
            const validateStep7 = () => { const inputs = pqX.slice(0, prob.steps.pq_x1x2.inputs); if (checkMultiInput(inputs, prob.steps.pq_x1x2.expected)) advanceStep(); else { setErrorMsg("Das Ergebnis der pq-Formel stimmt nicht. Tipp: Nutze den Taschenrechner!"); handleError(); } };
            const validateStep8 = () => { const inputs = lmInputs.slice(0, prob.steps.lm.inputs); if (checkMultiInput(inputs, prob.steps.lm.expected)) advanceStep(); else { setErrorMsg("Vergleiche deine Ergebnisse aus Schritt 7 mit der Definitionsmenge aus Schritt 1. Ist eine Zahl verboten?"); handleError(); } };

            // Dynamischer Style für Eingabefelder (Färbt sich nach Erfolg grün)
            const inputStyle = (stepNum, wClass="w-16") => `border-2 rounded p-2 text-center focus:outline-none transition-colors ${wClass} ${currentStep > stepNum ? 'border-green-500 bg-green-50 text-green-900 font-bold shadow-sm' : 'border-slate-300 focus:border-amber-500 bg-white shadow-inner'}`;

            return (
                <div className="page-transition max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                    <header className="bg-amber-500 text-amber-950 shadow-md p-6 rounded-xl mb-6">
                        <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div className="flex items-center space-x-3">
                                <FractionIcon className="w-8 h-8" />
                                <h1 className="text-2xl font-bold tracking-tight">Bruchgleichungstrainer <span className="text-amber-800 text-lg font-normal border-l-2 border-amber-600 pl-2 ml-2">10. Klasse</span></h1>
                            </div>
                            <div className="bg-amber-100 px-4 py-1.5 rounded-full text-sm font-bold shadow-sm">
                                {isPruefungsMode ? `Prüfung ${prob.year}` : `Zufallsaufgabe`}
                            </div>
                        </div>
                    </header>

                    <main className="space-y-6 relative">
                        <div className="flex flex-col sm:flex-row justify-center gap-3">
                            <button onClick={handleLoadPruefung} className={`font-bold py-2.5 px-5 rounded-lg shadow-sm transition-colors flex items-center justify-center ${isPruefungsMode ? 'bg-blue-100 text-blue-800 hover:bg-blue-200 border border-blue-300' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>
                                <BookOpen className="mr-2" size={18}/> {isPruefungsMode ? "Nächste Prüfungsaufgabe" : "Echte Prüfungsaufgaben lösen"}
                            </button>
                            <button onClick={handleGenerateProblem} className="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 px-5 rounded-lg shadow-sm transition-colors flex items-center justify-center">
                                <RefreshCw className="mr-2" size={18}/> Neue Zufallsaufgabe
                            </button>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="bg-amber-50 px-6 py-3 border-b border-amber-200 flex justify-between items-center">
                                <h2 className="font-semibold text-amber-900 flex items-center"><BookOpen size={18} className="mr-2"/> Gegebene Gleichung</h2>
                            </div>
                            <div className="p-8 flex justify-center bg-white overflow-x-auto min-h-[120px] items-center">
                                {prob.renderEquation()}
                            </div>
                        </div>

                        {/* Sticky Taschenrechner Button */}
                        <div className="sticky top-20 z-40 flex justify-center w-full my-4 pointer-events-none">
                            <button onClick={() => setCalcOpen(!calcOpen)} className="pointer-events-auto bg-slate-800 hover:bg-slate-900 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center transition-all duration-300 border-4 border-slate-700 hover:scale-105 hover:border-amber-400">
                                {calcOpen ? <XCircle className="w-7 h-7" /> : <Calculator className="w-7 h-7" />}
                            </button>
                        </div>

                        <div className="space-y-4">
                            <StepCard title="1. Definitionsmenge bestimmen" stepNum={1} currentStep={currentStep} theme="amber">
                                {currentStep === 1 && calcOpen && <CalculatorPanel calcInput={calcInput} setCalcInput={setCalcInput} />}
                                <p className="mb-4 text-slate-600">Welche Zahlen dürfen <b>nicht</b> für x eingesetzt werden?</p>
                                <div className="flex items-center space-x-3">
                                    <span className="font-semibold text-lg">D = ℝ \ {'{'}</span>
                                    <input type="text" value={defInputs[0]} onChange={e => setDefInputs([e.target.value, defInputs[1]])} className={inputStyle(1)} disabled={currentStep !== 1} />
                                    {prob.steps.def.inputs === 2 && (
                                        <><span className="font-semibold">;</span><input type="text" value={defInputs[1]} onChange={e => setDefInputs([defInputs[0], e.target.value])} className={inputStyle(1)} disabled={currentStep !== 1} /></>
                                    )}
                                    <span className="font-semibold text-lg">{'}'}</span>
                                    {currentStep === 1 && <SubmitBtn onClick={validateStep1} theme="amber" />}
                                </div>
                                {currentStep > 1 && <SuccessMark text={`D = ℝ \\ { ${prob.steps.def.expected.map(formatDe).join('; ')} }`} />}
                            </StepCard>

                            {currentStep >= 2 && (
                                <StepCard title="2. Hauptnenner (HN) finden" stepNum={2} currentStep={currentStep} theme="amber">
                                    {currentStep === 2 && calcOpen && <CalculatorPanel calcInput={calcInput} setCalcInput={setCalcInput} />}
                                    <p className="mb-4 text-slate-600">Bestimme den kleinsten gemeinsamen Nenner aller Brüche.</p>
                                    <div className="flex items-center space-x-3">
                                        <span className="font-semibold">HN =</span>
                                        <input type="text" value={hnInput} onChange={e => setHnInput(e.target.value)} placeholder="z.B. x(x-3)" className={inputStyle(2, "w-64")} disabled={currentStep !== 2} />
                                        {currentStep === 2 && <SubmitBtn onClick={validateStep2} theme="amber" />}
                                    </div>
                                    {currentStep > 2 && <SuccessMark text={`HN = ${formatDe(prob.steps.hn.expected[0])}`} />}
                                </StepCard>
                            )}

                            {currentStep >= 3 && (
                                <StepCard title="3. Mit dem Hauptnenner durchmultiplizieren" stepNum={3} currentStep={currentStep} theme="amber">
                                    {currentStep === 3 && calcOpen && <CalculatorPanel calcInput={calcInput} setCalcInput={setCalcInput} />}
                                    <p className="mb-4 text-slate-600">Multipliziere jeden Term der Gleichung mit dem HN.</p>
                                    <div className="flex flex-wrap items-center gap-3">
                                        <input type="text" value={multLeft} onChange={e => setMultLeft(e.target.value)} placeholder="Linke Seite" className={inputStyle(3, "w-64")} disabled={currentStep !== 3} />
                                        <span className="font-bold text-xl">=</span>
                                        <input type="text" value={multRight} onChange={e => setMultRight(e.target.value)} placeholder="Rechte Seite" className={inputStyle(3, "w-64")} disabled={currentStep !== 3} />
                                        {currentStep === 3 && <SubmitBtn onClick={validateStep3} theme="amber" />}
                                    </div>
                                    {currentStep > 3 && <SuccessMark text={`${formatDe(prob.steps.multLeft.expected[0])} = ${formatDe(prob.steps.multRight.expected[0])}`} />}
                                </StepCard>
                            )}

                            {currentStep >= 4 && (
                                <StepCard title="4. Zusammenfassen (Normalform)" stepNum={4} currentStep={currentStep} theme="amber">
                                    {currentStep === 4 && calcOpen && <CalculatorPanel calcInput={calcInput} setCalcInput={setCalcInput} />}
                                    <p className="mb-4 text-slate-600">Bringe alles auf eine Seite (= 0). Form: <span className="font-mono bg-amber-50 text-amber-900 p-1 rounded">x² + px + q = 0</span>.</p>
                                    <div className="flex items-center space-x-3">
                                        <input type="text" value={zusInput} onChange={e => setZusInput(e.target.value)} placeholder="z.B. x^2+x-12=0" className={inputStyle(4, "w-64 font-mono")} disabled={currentStep !== 4} />
                                        {currentStep === 4 && <SubmitBtn onClick={validateStep4} theme="amber" />}
                                    </div>
                                    {currentStep > 4 && <SuccessMark text={formatDe(prob.steps.zusammen.expected[0])} />}
                                </StepCard>
                            )}

                            {currentStep >= 5 && (
                                <StepCard title="5. Werte für die pq-Formel ablesen" stepNum={5} currentStep={currentStep} theme="amber">
                                    {currentStep === 5 && calcOpen && <CalculatorPanel calcInput={calcInput} setCalcInput={setCalcInput} />}
                                    <div className="flex items-center space-x-6">
                                        <div className="flex items-center space-x-2"><span className="font-semibold text-lg italic">p =</span><input type="text" value={pqP} onChange={e => setPqP(e.target.value)} className={inputStyle(5, "w-20")} disabled={currentStep !== 5} /></div>
                                        <div className="flex items-center space-x-2"><span className="font-semibold text-lg italic">q =</span><input type="text" value={pqQ} onChange={e => setPqQ(e.target.value)} className={inputStyle(5, "w-20")} disabled={currentStep !== 5} /></div>
                                        {currentStep === 5 && <SubmitBtn onClick={validateStep5} theme="amber" />}
                                    </div>
                                    {currentStep > 5 && <SuccessMark text={`p = ${formatDe(prob.steps.pq_p.expected[0])}, q = ${formatDe(prob.steps.pq_q.expected[0])}`} />}
                                </StepCard>
                            )}

                            {currentStep >= 6 && (
                                <StepCard title="6. Werte in die pq-Formel einsetzen" stepNum={6} currentStep={currentStep} theme="amber">
                                    {currentStep === 6 && calcOpen && <CalculatorPanel calcInput={calcInput} setCalcInput={setCalcInput} />}
                                    <p className="mb-4 text-slate-600">Setze dein <b className="text-amber-700">p</b> und <b className="text-amber-700">q</b> genau mit Vorzeichen in die Formel ein.</p>
                                    <div className="flex flex-wrap items-center space-x-2 text-xl font-math bg-slate-50 p-4 border border-slate-200 rounded-lg overflow-x-auto">
                                        <span>x₁,₂ = -</span>
                                        <Frac top={<input type="text" value={einsetzenP1} onChange={e=>setEinsetzenP1(e.target.value)} className={inputStyle(6, "w-16")} disabled={currentStep !== 6} placeholder="p" />} bot="2" />
                                        <span className="mx-2">±</span>
                                        <span className="text-4xl text-slate-800">√</span>
                                        <div className="border-t-2 border-slate-800 flex items-center pt-1 mt-3 space-x-2">
                                            <span>(</span>
                                            <Frac top={<input type="text" value={einsetzenP2} onChange={e=>setEinsetzenP2(e.target.value)} className={inputStyle(6, "w-16")} disabled={currentStep !== 6} placeholder="p" />} bot="2" />
                                            <span>)² - </span>
                                            <input type="text" value={einsetzenQ} onChange={e=>setEinsetzenQ(e.target.value)} className={inputStyle(6, "w-20")} disabled={currentStep !== 6} placeholder="q" />
                                        </div>
                                        {currentStep === 6 && <div className="ml-4"><SubmitBtn onClick={validateStep6} theme="amber" /></div>}
                                    </div>
                                    {currentStep > 6 && <SuccessMark text="Richtig eingesetzt!" />}
                                </StepCard>
                            )}

                            {currentStep >= 7 && (
                                <StepCard title="7. pq-Formel auflösen" stepNum={7} currentStep={currentStep} theme="amber">
                                    {currentStep === 7 && calcOpen && <CalculatorPanel calcInput={calcInput} setCalcInput={setCalcInput} />}
                                    <p className="mb-4 text-slate-600">Berechne die beiden möglichen Lösungen für x.</p>
                                    <div className="flex items-center space-x-6">
                                        <div className="flex items-center space-x-2"><span className="font-semibold text-lg">x₁ =</span><input type="text" value={pqX[0]} onChange={e => setPqX([e.target.value, pqX[1]])} className={inputStyle(7, "w-20")} disabled={currentStep !== 7} /></div>
                                        {prob.steps.pq_x1x2.inputs === 2 && (
                                            <div className="flex items-center space-x-2"><span className="font-semibold text-lg">x₂ =</span><input type="text" value={pqX[1]} onChange={e => setPqX([pqX[0], e.target.value])} className={inputStyle(7, "w-20")} disabled={currentStep !== 7} /></div>
                                        )}
                                        {currentStep === 7 && <SubmitBtn onClick={validateStep7} theme="amber" />}
                                    </div>
                                    {currentStep > 7 && <SuccessMark text={`x = ${prob.steps.pq_x1x2.expected.map(formatDe).join(' oder x = ')}`} />}
                                </StepCard>
                            )}

                            {currentStep >= 8 && (
                                <StepCard title="8. Lösungsmenge angeben" stepNum={8} currentStep={currentStep} theme="amber">
                                    {currentStep === 8 && calcOpen && <CalculatorPanel calcInput={calcInput} setCalcInput={setCalcInput} />}
                                    <p className="mb-4 text-slate-600">
                                        Prüfe deine x-Werte mit der Definitionsmenge aus Schritt 1. 
                                        {prob.steps.lm.inputs < prob.steps.pq_x1x2.inputs && <strong className="text-red-600 block mt-1">Achtung: Eine Lösung ist ungültig!</strong>}
                                    </p>
                                    <div className="flex items-center space-x-3">
                                        <span className="font-semibold text-lg">L = {'{'}</span>
                                        <input type="text" value={lmInputs[0]} onChange={e => setLmInputs([e.target.value, lmInputs[1]])} className={inputStyle(8, "w-16")} disabled={currentStep !== 8} />
                                        {prob.steps.lm.inputs === 2 && (
                                            <><span className="font-semibold">;</span><input type="text" value={lmInputs[1]} onChange={e => setLmInputs([lmInputs[0], e.target.value])} className={inputStyle(8, "w-16")} disabled={currentStep !== 8} /></>
                                        )}
                                        <span className="font-semibold text-lg">{'}'}</span>
                                        {currentStep === 8 && <SubmitBtn onClick={validateStep8} theme="amber" />}
                                    </div>
                                    {currentStep > 8 && <SuccessMark text={`L = { ${prob.steps.lm.expected.map(formatDe).join('; ')} }`} />}
                                </StepCard>
                            )}
                            
                            {errorMsg && currentStep <= 8 && (
                                <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded shadow-sm flex items-start space-x-3 transition-all animate-fade-in">
                                    <XCircle className="text-red-500 mt-0.5" size={20} />
                                    <div>
                                        <p className="text-red-700 font-medium">{errorMsg}</p>
                                        {showHint && (
                                            <div className="mt-2 text-sm text-red-600 bg-red-100 p-2 rounded">
                                                <strong className="flex items-center"><HelpCircle className="w-4 h-4 mr-1"/> Tipp (Format):</strong> 
                                                <code className="font-mono bg-white px-2 py-0.5 ml-1 rounded border border-red-200">{
                                                    currentStep === 1 ? prob.steps.def.expected.map(formatDe).join(' und ') :
                                                    currentStep === 2 ? formatDe(prob.steps.hn.expected[0]) :
                                                    currentStep === 3 ? `${formatDe(prob.steps.multLeft.expected[0])} = ${formatDe(prob.steps.multRight.expected[0])}` :
                                                    currentStep === 4 ? formatDe(prob.steps.zusammen.expected[0]) :
                                                    currentStep === 5 ? `p = ${formatDe(prob.steps.pq_p.expected[0])}, q = ${formatDe(prob.steps.pq_q.expected[0])}` :
                                                    currentStep === 6 ? `Fülle die Kästchen mit: ${formatDe(prob.steps.pq_p.expected[0])} und ${formatDe(prob.steps.pq_q.expected[0])}` :
                                                    currentStep === 7 ? prob.steps.pq_x1x2.expected.map(formatDe).join(' und ') :
                                                    prob.steps.lm.expected.map(formatDe).join(' und ')
                                                }</code>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {currentStep > 8 && (
                                <div className="bg-green-50 border-2 border-green-500 p-8 rounded-xl shadow-sm text-center animate-fade-in mt-6">
                                    {calcOpen && <CalculatorPanel calcInput={calcInput} setCalcInput={setCalcInput} />}
                                    <h3 className="text-3xl font-bold text-green-800 mb-3">Klasse gemacht! 🎉</h3>
                                    <p className="text-green-700 mb-2 text-lg">Du hast die Bruchgleichung vollständig und richtig gelöst.</p>
                                    <p className="text-green-600 text-sm mb-6">Wähle oben einfach eine neue Aufgabe aus, um weiterzutrainieren.</p>
                                    
                                    <div className="flex flex-col sm:flex-row justify-center gap-4 mt-6">
                                        <button onClick={handleLoadPruefung} className={`font-bold py-2.5 px-6 rounded-lg shadow-md transition-colors flex items-center justify-center ${isPruefungsMode ? 'bg-blue-100 text-blue-800 hover:bg-blue-200 border border-blue-300' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>
                                            <BookOpen className="mr-2" size={18}/> {isPruefungsMode ? "Nächste Prüfungsaufgabe" : "Echte Prüfungsaufgaben lösen"}
                                        </button>
                                        <button onClick={handleGenerateProblem} className="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 px-6 rounded-lg shadow-md transition-colors flex items-center justify-center">
                                            <RefreshCw className="mr-2" size={18}/> Neue Zufallsaufgabe
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        // ==========================================
        // 5. SEITEN (Home, Impressum, etc.)
        // ==========================================

        const HomePage = ({ navigateTo }) => (
            <div className="page-transition">
                <section className="bg-gradient-to-b from-indigo-50 to-slate-50 py-16 sm:py-24 border-b border-slate-200">
                    <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center gap-8 md:gap-12">
                        <div className="shrink-0 relative flex justify-center">
                            <div className="absolute inset-0 bg-indigo-200 blur-2xl opacity-30 scale-125 rounded-full"></div>
                            <img 
                                src="Logo-sMArTH.png" 
                                alt="sMArTHEMATIK Logo" 
                                onError={(e) => {e.target.onerror = null; e.target.src="https://via.placeholder.com/300x100/ffffff/4f46e5?text= sMArTHEMATIK"}}
                                className="relative w-64 md:w-80 h-auto object-contain drop-shadow-sm"
                            />
                        </div>
                        <div className="text-center md:text-left space-y-4">
                            <div className="inline-block px-3 py-1 bg-indigo-100 text-indigo-700 text-sm font-semibold rounded-full mb-2">
                                sMArTHEMATIK Übungen
                            </div>
                            <h2 className="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-900">
                                Herzlich willkommen auf dieser Übungsseite von Martin Geiger
                            </h2>
                            <p className="text-lg text-slate-600 max-w-2xl leading-relaxed">
                                Hier stehen dir verschiedene interaktive Mathetrainer und digitale Lerntools zum Üben zur Verfügung.
                            </p>
                        </div>
                    </div>
                </section>

                <section className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
                    <div className="text-center mb-12">
                        <h3 className="text-2xl font-bold text-slate-800">Verfügbare Mathetrainer</h3>
                        <p className="text-slate-500 mt-2">Wähle ein Thema aus, um direkt loszulegen.</p>
                    </div>

                    <div className="grid md:grid-cols-3 gap-6">
                        <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-xl transition-all hover:-translate-y-1 flex flex-col items-center text-center group cursor-pointer" onClick={() => navigateTo('wachstum')}>
                            <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                <TrendingUp className="w-8 h-8" />
                            </div>
                            <h4 className="text-xl font-bold text-slate-800 mb-3">Wachstum</h4>
                            <p className="text-slate-600 mb-8 flex-grow text-sm">Zinseszins, Bevölkerung und Bakterien berechnen.</p>
                            <button className="w-full inline-flex items-center justify-center px-4 py-2 border border-emerald-200 font-medium rounded-lg text-emerald-700 bg-emerald-50 group-hover:bg-emerald-600 group-hover:text-white shadow-sm transition-all">
                                Zum Trainer
                            </button>
                        </div>

                        <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-xl transition-all hover:-translate-y-1 flex flex-col items-center text-center group cursor-pointer" onClick={() => navigateTo('zerfall')}>
                            <div className="w-16 h-16 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                <TrendingDown className="w-8 h-8" />
                            </div>
                            <h4 className="text-xl font-bold text-slate-800 mb-3">Zerfall</h4>
                            <p className="text-slate-600 mb-8 flex-grow text-sm">Radioaktivität, Wertverlust und Medikamente berechnen.</p>
                            <button className="w-full inline-flex items-center justify-center px-4 py-2 border border-rose-200 font-medium rounded-lg text-rose-700 bg-rose-50 group-hover:bg-rose-600 group-hover:text-white shadow-sm transition-all">
                                Zum Trainer
                            </button>
                        </div>

                        <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-xl transition-all hover:-translate-y-1 flex flex-col items-center text-center group cursor-pointer" onClick={() => navigateTo('gleichungen')}>
                            <div className="w-16 h-16 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                <FractionIcon className="w-8 h-8" />
                            </div>
                            <h4 className="text-xl font-bold text-slate-800 mb-3">Bruchgleichungen</h4>
                            <p className="text-slate-600 mb-8 flex-grow text-sm">Training zur Lösung komplexer Bruchgleichungen mit pq-Formel.</p>
                            <button className="w-full inline-flex items-center justify-center px-4 py-2 border border-amber-200 font-medium rounded-lg text-amber-700 bg-amber-50 group-hover:bg-amber-600 group-hover:text-white shadow-sm transition-all">
                                Zum Trainer
                            </button>
